<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rケア発信">
<meta name="theme-color" content="#2c5a2c">
<title>Rケア 思考蓄積AIツール</title>
<style>
:root{--bg:#fafaf7;--surface:#fff;--ink:#2c3e2e;--ink-soft:#5a6a5a;--line:#d4dcd4;--accent:#5a8c5a;--accent-soft:#e8efe4;--accent-deep:#2c5a2c;--ok:#2d7a3e;--warn:#b8860b;--err:#a83232;--purple:#8a6dc1;--blue:#3b7bc4}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;font-size:14px}
header{background:var(--accent-deep);color:#fff;padding:14px 24px;display:flex;align-items:baseline;gap:14px;border-bottom:3px solid var(--accent)}
header h1{margin:0;font-size:17px;letter-spacing:.06em;font-weight:600}
header .sub{font-size:11px;opacity:.7}
header .ver{font-size:10px;opacity:.5;margin-left:auto}
.container{max-width:900px;margin:0 auto;padding:20px}
.section{background:var(--surface);border:1px solid var(--line);padding:20px;margin-bottom:14px;border-radius:2px}
.section h2{margin:0 0 12px;font-size:13px;letter-spacing:.08em;color:var(--accent-deep);border-bottom:1px solid var(--line);padding-bottom:8px;display:flex;align-items:center;gap:8px}
.section h2::before{content:"";width:4px;height:14px;background:var(--accent);display:inline-block}
.sn{background:var(--accent);color:#fff;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border-radius:2px;margin-right:6px}
label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;font-weight:600}
input[type=text],input[type=password],input[type=date],textarea,select{width:100%;padding:8px 10px;border:1px solid var(--line);background:var(--bg);font-family:inherit;font-size:13px;color:var(--ink);border-radius:2px}
input:focus,textarea:focus,select:focus{outline:2px solid var(--accent);outline-offset:-1px;background:#fff}
textarea{resize:vertical}
button{background:var(--ink);color:#fff;border:none;padding:9px 18px;font-family:inherit;font-size:12px;letter-spacing:.05em;cursor:pointer;transition:all .15s;border-radius:2px}
button:hover:not(:disabled){background:var(--accent)}
button:disabled{opacity:.4;cursor:not-allowed}
button.primary{background:var(--accent)}
button.primary:hover:not(:disabled){background:var(--accent-deep)}
button.sm{padding:5px 12px;font-size:11px}
button.mic{background:var(--blue);font-size:13px;padding:12px 16px}
button.mic.recording{background:var(--err);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.form-row{display:flex;gap:6px;align-items:flex-end}
.form-row>div{flex:1}
.status{padding:10px 14px;margin-top:10px;font-size:12px;border-left:3px solid;border-radius:2px}
.status.info{background:#e8f0f7;border-color:#3b7bc4;color:#1e4975}
.status.success{background:#e8f5ea;border-color:var(--ok);color:#1e5028}
.status.error{background:#fbeaea;border-color:var(--err);color:#7a2020}
.hint{font-size:10px;color:var(--ink-soft);margin-top:4px}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;background:var(--bg);border:1px solid var(--line);border-radius:14px;cursor:pointer;font-size:12px;color:var(--ink-soft);transition:all .15s}
.tag:hover{background:var(--accent-soft)}
.tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tag.tone-active{background:var(--purple);color:#fff;border-color:var(--purple)}
.tag.use-active{background:var(--blue);color:#fff;border-color:var(--blue)}
.preview-block{background:var(--bg);padding:12px 14px;border-left:3px solid var(--accent);margin-bottom:8px;border-radius:2px}
.preview-block .l{font-size:10px;color:var(--accent-deep);font-weight:600;margin-bottom:4px;letter-spacing:.05em}
.preview-block .v{font-size:13px;white-space:pre-wrap;line-height:1.6}
.loader{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.mic-hint{background:#fff8e1;border-left:3px solid var(--warn);padding:8px 12px;font-size:11px;color:#7a5a00;margin-bottom:10px;border-radius:2px}
footer{text-align:center;padding:16px;font-size:10px;color:var(--ink-soft)}

/* スマホ最適化 */
@media (max-width: 768px) {
  body { font-size: 15px }
  header { padding: 10px 14px; flex-wrap: wrap; gap: 6px }
  header h1 { font-size: 15px }
  header .sub { display: none }
  header .ver { font-size: 9px }
  .container { padding: 10px }
  .section { padding: 14px; margin-bottom: 10px }
  .section h2 { font-size: 12px }
  input[type=text], input[type=password], input[type=date], textarea, select {
    font-size: 16px; padding: 12px; min-height: 44px;
  }
  textarea { min-height: 120px }
  button { padding: 12px 18px; font-size: 14px; min-height: 44px }
  button.sm { padding: 9px 14px; font-size: 12px; min-height: 36px }
  button.mic { padding: 14px 18px; font-size: 15px }
  .form-row { flex-direction: column; align-items: stretch; gap: 8px }
  .form-row > div { width: 100% }
  .tag { padding: 10px 14px; font-size: 13px }
}
</style>
</head>
<body>

<header>
  <h1>Rケア 思考蓄積AIツール</h1>
  <span class="sub">THINK & ARCHIVE</span>
  <span class="ver">v1.0 — スマホ・音声入力対応</span>
</header>

<div class="container">

<!-- 設定 -->
<div class="section">
  <h2><span class="sn">1</span>設定（最初に1回だけ）</h2>
  <div class="form-row" style="margin-bottom:10px">
    <div><label>Claude APIキー</label><input type="password" id="apiKey" placeholder="sk-ant-api03-..."></div>
    <button class="sm" onclick="saveKey('apiKey','rcare_think_api')">保存</button>
  </div>
  <div class="form-row" style="margin-bottom:10px">
    <div><label>GAS Web App URL</label><input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/xxxxx/exec"></div>
    <button class="sm" onclick="saveKey('gasUrl','rcare_think_gas')">保存</button>
  </div>
  <div class="form-row" style="margin-bottom:10px">
    <div><label>シークレットキー（任意・推奨）</label><input type="password" id="appSecret" placeholder="GAS側のAPP_SECRETと一致させる"></div>
    <button class="sm" onclick="saveKey('appSecret','rcare_think_secret')">保存</button>
  </div>
  <div class="form-row" style="margin-bottom:10px">
    <div><label>思考蓄積DB ID</label><input type="text" id="dbId" value="295b586196ae47c4bc196523a8369613"></div>
    <button class="sm" onclick="saveKey('dbId','rcare_think_db')">保存</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap"><button class="sm" onclick="testConnection()">🔌 接続テスト</button></div>
  <div id="setupStatus"></div>
</div>

<!-- 入力 -->
<div class="section">
  <h2><span class="sn">2</span>思考を記録</h2>
  <div class="form-row" style="margin-bottom:10px">
    <div><label>録音日</label><input type="date" id="recordDate"></div>
  </div>
  <label>原文（話したこと・思いついたこと） <span style="color:var(--err)">*</span></label>
  <div class="mic-hint">💡 スマホの場合：テキストエリアをタップ→キーボードのマイクボタン🎤で音声入力。話し終わったら確定。</div>
  <textarea id="rawText" rows="10" placeholder="ここに話したい内容を吹き込むか、文字起こしを貼り付け..."></textarea>
  <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
    <button class="primary" id="aiBtn" onclick="runAI()">🧠 AIで整理</button>
    <button class="sm" onclick="clearInput()">クリア</button>
  </div>
  <div id="aiStatus"></div>
</div>

<!-- AI結果 -->
<div class="section" id="resultSec" style="display:none">
  <h2><span class="sn">3</span>AI整理結果（確認・編集）</h2>
  <div style="margin-bottom:12px">
    <label>タイトル（一行サマリ）</label>
    <input type="text" id="r_title">
  </div>
  <div style="margin-bottom:12px">
    <label>要点</label>
    <textarea id="r_summary" rows="3"></textarea>
  </div>
  <div style="margin-bottom:12px">
    <label>キーポイント（箇条書き）</label>
    <textarea id="r_keypoints" rows="4"></textarea>
  </div>
  <div style="margin-bottom:12px">
    <label>トピック（複数選択可）</label>
    <div class="tag-row" id="topicTags"></div>
  </div>
  <div style="margin-bottom:12px">
    <label>トーン（1つ選択）</label>
    <div class="tag-row" id="toneTags"></div>
  </div>
  <div style="margin-bottom:12px">
    <label>用途候補（複数選択可、後で投稿時に判断）</label>
    <div class="tag-row" id="useTags"></div>
  </div>
  <div style="margin-bottom:12px">
    <label>メモ（任意・追加で書き加えたいこと）</label>
    <textarea id="r_memo" rows="2" placeholder="後で投稿時に参考にしたいこと等"></textarea>
  </div>
</div>

<!-- 保存 -->
<div class="section" id="saveSec" style="display:none">
  <h2><span class="sn">4</span>Notionに保存</h2>
  <p style="font-size:12px;color:var(--ink-soft)">思考蓄積DBに新規ページとして保存します。ステータスは「整理済み」になります。</p>
  <button class="primary" id="saveBtn" onclick="saveToNotion()">📤 Notionに保存</button>
  <div id="saveStatus"></div>
</div>

</div>

<footer>Rケア 思考蓄積AIツール v1.0 / Claude API × GAS × Notion API</footer>

<script>
const TOPICS = ['経営','介護現場','採用','個人哲学','業界批判','その他'];
const TONES = ['熱量高め','フラット','怒り','前向き','自省'];
const USES = ['X','Instagram','ブログ','note','HP更新','社内共有'];

let selectedTopics = [];
let selectedTone = '';
let selectedUses = [];

window.addEventListener('load', () => {
  document.getElementById('apiKey').value = localStorage.getItem('rcare_think_api') || '';
  document.getElementById('gasUrl').value = localStorage.getItem('rcare_think_gas') || '';
  document.getElementById('appSecret').value = localStorage.getItem('rcare_think_secret') || '';
  const savedDb = localStorage.getItem('rcare_think_db');
  if (savedDb) document.getElementById('dbId').value = savedDb;
  document.getElementById('recordDate').value = new Date().toISOString().slice(0,10);
});

function saveKey(inputId, lsKey) {
  const v = document.getElementById(inputId).value.trim();
  if (!v && lsKey === 'rcare_think_secret') {
    localStorage.setItem(lsKey, '');
    setStatus('setupStatus','✓ シークレットキーをクリア','success');
    return;
  }
  if (!v) { setStatus('setupStatus','値を入力してください','error'); return; }
  localStorage.setItem(lsKey, v);
  setStatus('setupStatus','✓ 保存しました','success');
}

async function callGas(action, data = {}) {
  const gasUrl = localStorage.getItem('rcare_think_gas');
  if (!gasUrl) throw new Error('GAS URL未設定');
  const payload = Object.assign({action}, data);
  const secret = localStorage.getItem('rcare_think_secret');
  if (secret) payload.secret = secret;
  const res = await fetch(gasUrl, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('GAS応答エラー: '+res.status);
  const result = await res.json();
  if (!result.ok) throw new Error(result.error || 'エラー発生');
  return result;
}

async function testConnection() {
  const dbId = document.getElementById('dbId').value.trim();
  if (!dbId) { setStatus('setupStatus','DB IDを入力してください','error'); return; }
  setStatus('setupStatus','接続テスト中...','info');
  try {
    const r = await callGas('testConnection', {databaseId: dbId});
    setStatus('setupStatus','✓ 接続成功（思考蓄積DBへのアクセスOK）','success');
  } catch (e) {
    setStatus('setupStatus','エラー: '+e.message,'error');
  }
}

async function callClaude(prompt) {
  const key = localStorage.getItem('rcare_think_api');
  if (!key) throw new Error('Claude APIキー未設定');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 2048,
      messages: [{role:'user', content: prompt}]
    })
  });
  if (!res.ok) { const e = await res.text(); throw new Error(`Claude API ${res.status}: ${e.slice(0,200)}`); }
  const data = await res.json();
  return data.content.filter(c => c.type==='text').map(c => c.text).join('\n');
}

async function runAI() {
  const text = document.getElementById('rawText').value.trim();
  if (!text) { setStatus('aiStatus','原文を入力してください','error'); return; }
  if (text.length < 20) { setStatus('aiStatus','原文が短すぎます（20文字以上）','error'); return; }

  const btn = document.getElementById('aiBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>AI整理中...';
  setStatus('aiStatus','Claude AIが整理中...','info');

  const prompt = `あなたは介護事業者「Rケア」の代表（社長）の発信支援アシスタントです。社長が話した内容・思いついたことを、後で発信に活かせるように整理してください。

# 入力原文
${text}

# 出力形式（厳密にこの形式で）

==TITLE==
（一行サマリ。10〜30字程度。原文の本質を簡潔に。例：「介護業界の流れ作業化への違和感」）

==SUMMARY==
（要点：3〜5行で要約。何について、どんな考えか、なぜそう思うのか）

==KEYPOINTS==
（キーポイント：箇条書きで3〜6項目。後で発信時に使える「核となる主張」を抽出）
- ...
- ...

==TOPICS==
（トピック：以下から該当するものをカンマ区切りで。複数可）
利用可能: ${TOPICS.join('、')}
出力: 経営, 介護現場

==TONE==
（トーン：以下から1つ選ぶ。原文の雰囲気から推測）
利用可能: ${TONES.join('、')}
出力: 熱量高め

==USES==
（用途候補：このネタが活きそうな媒体をカンマ区切りで。複数可）
利用可能: ${USES.join('、')}
出力: X, ブログ

# 注意
- 創作・推測はせず、原文の内容に忠実に
- トピック・トーン・用途候補は必ず指定された選択肢から選ぶ
- キーポイントは箇条書きの文字列だけにする
- 前置き・後書きは一切不要`;

  try {
    const result = await callClaude(prompt);
    parseAndDisplay(result);
    document.getElementById('resultSec').style.display = 'block';
    document.getElementById('saveSec').style.display = 'block';
    setStatus('aiStatus','✓ AI整理完了。内容を確認・編集してください','success');
    document.getElementById('resultSec').scrollIntoView({behavior:'smooth'});
  } catch (e) {
    setStatus('aiStatus','エラー: '+e.message,'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🧠 AIで整理';
  }
}

function parseAndDisplay(text) {
  const sections = {};
  const blocks = text.split(/==(TITLE|SUMMARY|KEYPOINTS|TOPICS|TONE|USES)==/);
  for (let i = 1; i < blocks.length; i += 2) {
    sections[blocks[i].trim()] = (blocks[i+1]||'').trim();
  }
  document.getElementById('r_title').value = sections.TITLE || '';
  document.getElementById('r_summary').value = sections.SUMMARY || '';
  document.getElementById('r_keypoints').value = sections.KEYPOINTS || '';

  // トピック自動選択
  selectedTopics = [];
  if (sections.TOPICS) {
    const parsed = sections.TOPICS.split(',').map(s => s.trim().replace(/^出力[::]\s*/,''));
    parsed.forEach(t => { if (TOPICS.includes(t)) selectedTopics.push(t); });
  }
  // トーン自動選択
  selectedTone = '';
  if (sections.TONE) {
    const t = sections.TONE.trim().replace(/^出力[::]\s*/,'');
    if (TONES.includes(t)) selectedTone = t;
  }
  // 用途自動選択
  selectedUses = [];
  if (sections.USES) {
    const parsed = sections.USES.split(',').map(s => s.trim().replace(/^出力[::]\s*/,''));
    parsed.forEach(u => { if (USES.includes(u)) selectedUses.push(u); });
  }
  renderTags();
}

function renderTags() {
  document.getElementById('topicTags').innerHTML = TOPICS.map(t =>
    `<span class="tag ${selectedTopics.includes(t)?'active':''}" onclick="toggleTopic('${t}')">${t}</span>`
  ).join('');
  document.getElementById('toneTags').innerHTML = TONES.map(t =>
    `<span class="tag ${selectedTone===t?'tone-active':''}" onclick="setTone('${t}')">${t}</span>`
  ).join('');
  document.getElementById('useTags').innerHTML = USES.map(u =>
    `<span class="tag ${selectedUses.includes(u)?'use-active':''}" onclick="toggleUse('${u}')">${u}</span>`
  ).join('');
}
function toggleTopic(t) {
  const i = selectedTopics.indexOf(t);
  if (i>=0) selectedTopics.splice(i,1); else selectedTopics.push(t);
  renderTags();
}
function setTone(t) {
  selectedTone = (selectedTone===t) ? '' : t;
  renderTags();
}
function toggleUse(u) {
  const i = selectedUses.indexOf(u);
  if (i>=0) selectedUses.splice(i,1); else selectedUses.push(u);
  renderTags();
}

async function saveToNotion() {
  const title = document.getElementById('r_title').value.trim();
  const recordDate = document.getElementById('recordDate').value;
  if (!title) { setStatus('saveStatus','タイトルを入力してください','error'); return; }

  const dbId = localStorage.getItem('rcare_think_db');
  if (!dbId) { setStatus('saveStatus','DB ID未設定','error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>保存中...';

  try {
    const props = {
      'タイトル': { title: [{text:{content: title}}] },
      'ステータス': { select: {name:'整理済み'} },
      '要点': { rich_text: chunkText(document.getElementById('r_summary').value) },
      'キーポイント': { rich_text: chunkText(document.getElementById('r_keypoints').value) },
      '元音声・原文': { rich_text: chunkText(document.getElementById('rawText').value) },
      'メモ': { rich_text: chunkText(document.getElementById('r_memo').value) }
    };
    if (recordDate) props['録音日'] = { date: {start: recordDate} };
    if (selectedTopics.length > 0) props['トピック'] = { multi_select: selectedTopics.map(t => ({name:t})) };
    if (selectedTone) props['トーン'] = { select: {name: selectedTone} };
    if (selectedUses.length > 0) props['用途候補'] = { multi_select: selectedUses.map(u => ({name:u})) };

    const r = await callGas('createPage', {databaseId: dbId, properties: props});
    setStatus('saveStatus',`✓ Notionに保存しました（${title}）`,'success');
  } catch (e) {
    setStatus('saveStatus','エラー: '+e.message,'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '📤 Notionに保存';
  }
}

function clearInput() {
  if (!confirm('入力内容をクリアしますか？')) return;
  document.getElementById('rawText').value = '';
  document.getElementById('resultSec').style.display = 'none';
  document.getElementById('saveSec').style.display = 'none';
  selectedTopics = []; selectedTone = ''; selectedUses = [];
}

function chunkText(text) {
  if (!text) return [{text:{content:''}}];
  const chunks = [];
  let s = text;
  while (s.length > 2000) { chunks.push({text:{content: s.slice(0,2000)}}); s = s.slice(2000); }
  if (s) chunks.push({text:{content: s}});
  return chunks;
}

function setStatus(id, msg, type) {
  document.getElementById(id).innerHTML = `<div class="status ${type}">${esc(msg)}</div>`;
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>

</body>
</html>
